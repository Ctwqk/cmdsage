[[command]]
name = "systemctl-status"
binary = "systemctl"
template = "systemctl status {service}"
description = "查看系统服务状态"
keywords = ["服务", "systemctl", "状态", "service", "systemd", "运行状态"]
examples = [
  { input = "查看 nginx 状态", filled = "systemctl status nginx" },
  { input = "查看 docker 服务状态", filled = "systemctl status docker" },
]
platforms = ["linux"]
risk = "safe"
args = [
  { name = "service", required = true, description = "服务名称" },
]

[[command]]
name = "systemctl-start"
binary = "systemctl"
template = "sudo systemctl start {service}"
description = "启动系统服务"
keywords = ["启动", "服务", "systemctl", "start"]
examples = [
  { input = "启动 nginx", filled = "sudo systemctl start nginx" },
]
platforms = ["linux"]
risk = "moderate"
args = [
  { name = "service", required = true, description = "服务名称" },
]

[[command]]
name = "systemctl-stop"
binary = "systemctl"
template = "sudo systemctl stop {service}"
description = "停止系统服务"
keywords = ["停止", "服务", "systemctl", "stop", "关闭"]
examples = [
  { input = "停止 nginx", filled = "sudo systemctl stop nginx" },
]
platforms = ["linux"]
risk = "moderate"
args = [
  { name = "service", required = true, description = "服务名称" },
]

[[command]]
name = "systemctl-restart"
binary = "systemctl"
template = "sudo systemctl restart {service}"
description = "重启系统服务"
keywords = ["重启", "服务", "systemctl", "restart"]
examples = [
  { input = "重启 nginx", filled = "sudo systemctl restart nginx" },
  { input = "重启 docker", filled = "sudo systemctl restart docker" },
]
platforms = ["linux"]
risk = "moderate"
args = [
  { name = "service", required = true, description = "服务名称" },
]

[[command]]
name = "systemctl-enable"
binary = "systemctl"
template = "sudo systemctl enable {service}"
description = "设置服务开机自启"
keywords = ["开机", "自启", "enable", "systemctl", "自动启动"]
examples = [
  { input = "设置 nginx 开机自启", filled = "sudo systemctl enable nginx" },
]
platforms = ["linux"]
risk = "moderate"
args = [
  { name = "service", required = true, description = "服务名称" },
]

[[command]]
name = "systemctl-list"
binary = "systemctl"
template = "systemctl list-units --type=service {flags}"
description = "列出所有系统服务"
keywords = ["所有服务", "列出", "服务列表", "systemctl", "units"]
examples = [
  { input = "查看所有运行中的服务", filled = "systemctl list-units --type=service --state=running" },
  { input = "查看所有服务", filled = "systemctl list-units --type=service" },
]
platforms = ["linux"]
risk = "safe"
args = [
  { name = "flags", default = "", description = "--state=running 只显示运行中" },
]

[[command]]
name = "journalctl-logs"
binary = "journalctl"
template = "journalctl {flags} -u {service}"
description = "查看系统日志 (systemd journal)"
keywords = ["日志", "journalctl", "journal", "系统日志", "syslog"]
examples = [
  { input = "查看 nginx 日志", filled = "journalctl -u nginx --no-pager -n 100" },
  { input = "实时跟踪服务日志", filled = "journalctl -u nginx -f" },
  { input = "查看今天的系统日志", filled = "journalctl --since today" },
]
platforms = ["linux"]
risk = "safe"
args = [
  { name = "flags", default = "--no-pager -n 100", description = "-f 实时, -n 行数, --since 时间" },
  { name = "service", required = true, description = "服务名称" },
]

