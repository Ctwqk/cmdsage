[[command]]
name = "dmesg-log"
binary = "dmesg"
template = "dmesg {flags}"
description = "查看内核日志 (硬件、驱动等)"
keywords = ["内核", "dmesg", "硬件", "驱动", "启动日志"]
examples = [
  { input = "查看内核日志", filled = "dmesg --follow" },
  { input = "查看最近的内核消息", filled = "dmesg | tail -50" },
]
platforms = ["linux"]
risk = "safe"
args = [
  { name = "flags", default = "| tail -50", description = "--follow 实时, | tail -N 最近N行" },
]
